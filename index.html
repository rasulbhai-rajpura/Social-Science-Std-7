// --- VARIABLE DECLARATIONS: ગેમ મેનેજમેન્ટ વેરિયેબલ્સ ---
let quiz=[], current=0, score=0, timeLeft=20, timerId, answered=[];
let isAlreadyPlayed = false;

// --- SHUFFLE FUNCTION: ડેટા આડોઅવળો કરવા માટે ---
function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
}

// --- CHAPTER LOADER: પાઠનું લિસ્ટ લોડ કરવા માટે ---
function loadChapters(){
    const sub=document.getElementById("subject").value;
    const ch=document.getElementById("chapter");
    ch.innerHTML='<option value="">પાઠ પસંદ કરો</option>';
    if(sub && DATA[sub]) Object.keys(DATA[sub]).forEach(k=>ch.innerHTML+=`<option value="${k}">${k}</option>`);
}

// --- INITIAL CHECK: ક્વિઝ શરૂ કરતા પહેલાની તપાસ ---
function checkAndStart(){
    const roll=document.getElementById("roll").value.trim();
    const name=document.getElementById("studentName").value.trim();
    const sub=document.getElementById("subject").value;
    const ch=document.getElementById("chapter").value;
    if(!roll||!name||!sub||!ch){alert("બધી માહિતી ભરો!"); return;}

    database.ref('results').once('value', snap => {
        isAlreadyPlayed = false;
        snap.forEach(child => {
            const d = child.val();
            if(String(d.roll) === String(roll) && d.ch === ch) isAlreadyPlayed = true;
        });
        if(isAlreadyPlayed) alert("તમે અગાઉ આ ક્વિઝ રમી લીધી છે. પ્રેક્ટિસ માટે રમી શકાય, પણ સ્કોર સેવ થશે નહીં.");
        startQuiz();
    });
}

// --- START QUIZ: ક્વિઝ શરૂ કરવાનું મુખ્ય ફંક્શન (સફલ સાથે) ---
function startQuiz(){
    const sub=document.getElementById("subject").value, ch=document.getElementById("chapter").value;
    // પ્રશ્નો સફલ કરીને લોડ કરવા
    quiz=shuffleArray([...(DATA[sub][ch]||[])]);
    
    current=0; score=0;
    answered=new Array(quiz.length).fill(false);
    document.getElementById("home").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    createPalette(); 
    showQuestion();
}

// --- QUESTION PALETTE: પ્રશ્ન ક્રમાંક બટન્સ બનાવવા ---
function createPalette(){
    const pal=document.getElementById("palette"); pal.innerHTML="";
    quiz.forEach((_,i)=>{
        const btn=document.createElement("button");
        btn.textContent=i+1; btn.id="p"+i;
        btn.onclick=()=> { if(answered[i]) { current=i; showQuestion(); } };
        pal.appendChild(btn);
    });
}

// --- TIMER FUNCTION: સમય મર્યાદા મેનેજમેન્ટ ---
function startTimer(){
    if(timerId) clearInterval(timerId);
    timeLeft = 20;
    document.getElementById("timer").textContent=`⏱ ${timeLeft}`;
    timerId=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").textContent=`⏱ ${timeLeft}`;
        if(timeLeft <= 0) { clearInterval(timerId); autoSkip(); }
    },1000);
}

// --- AUTO SKIP: સમય પૂરો થાય ત્યારે આપોઆપ આગળ વધવું ---
function autoSkip() {
    if(!answered[current]) {
        answered[current] = true;
        document.getElementById("p"+current).style.background="#bbb";
        document.getElementById('sound-wrong').currentTime = 0;
        document.getElementById('sound-wrong').play();
        setTimeout(nextStep, 1000);
    }
}

// --- SHOW QUESTION: પ્રશ્ન અને ઓપ્શન ડિસ્પ્લે કરવા (સફલ સાથે) ---
function showQuestion(){
    document.getElementById("progress").textContent=`પ્રશ્ન ${current+1}/${quiz.length}`;
    document.getElementById("q").textContent=quiz[current].q;
    document.querySelectorAll("#palette button").forEach(b=>b.style.boxShadow="none");
    document.getElementById("p"+current).style.boxShadow="0 0 10px black";
    
    const opts=document.getElementById("opts"); opts.innerHTML="";
    
    // ઓપ્શન પણ સફલ કરીને બતાવવા
    let shuffledOptions = shuffleArray([...quiz[current].o]);
    
    shuffledOptions.forEach(opt=>{
        const d=document.createElement("div"); d.className="option"; d.textContent=opt;
        d.onclick=()=>checkAnswer(opt,d); opts.appendChild(d);
    });
    
    if(!answered[current]) startTimer();
    else { clearInterval(timerId); document.getElementById("timer").textContent = "પૂર્ણ"; }
}

// --- CHECK ANSWER: જવાબ સાચો છે કે ખોટો તેની તપાસ (સાઉન્ડ સાથે) ---
function checkAnswer(selected, el){
    if(answered[current]) return;
    clearInterval(timerId);
    answered[current]=true;
    const isCorrect = (selected === quiz[current].a);
    
    if(isCorrect){ 
        document.getElementById('sound-correct').currentTime = 0;
        document.getElementById('sound-correct').play();
        score++; el.classList.add("right"); 
        document.getElementById("p"+current).style.background="#2ecc71"; 
        document.getElementById("p"+current).style.color="white";
    } else { 
        document.getElementById('sound-wrong').currentTime = 0;
        document.getElementById('sound-wrong').play();
        el.classList.add("wrong"); 
        document.getElementById("p"+current).style.background="#e74c3c"; 
        document.getElementById("p"+current).style.color="white";
        [...document.querySelectorAll(".option")].forEach(o=>{if(o.textContent===quiz[current].a)o.classList.add("right")});
    }
    setTimeout(nextStep, 1200);
}

// --- NEXT STEP: આગલા પ્રશ્ન પર જવું ---
function nextStep() { if(++current < quiz.length) showQuestion(); else finishQuiz(); }

// --- FINISH QUIZ: ક્વિઝ પૂર્ણ કરવી અને ડેટા સેવ કરવો ---
function finishQuiz(){
    clearInterval(timerId);
    const sName=document.getElementById("studentName").value, roll=document.getElementById("roll").value, ch=document.getElementById("chapter").value;
    const percent=Math.round((score/quiz.length)*100), date=new Date().toLocaleString('gu-IN');
    if(!isAlreadyPlayed) database.ref('results').push({ roll: parseInt(roll), name: sName, ch, score: score+"/"+quiz.length, percent: percent+"%", date });
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("result-container").innerHTML=`<h2 style="color:#4a148c;">🌟 ${sName} નું પરિણામ 🌟</h2><p>સ્કોર: ${score}/${quiz.length}</p><p>ટકા: ${percent}%</p>`;
}

// --- TEACHER LOGIN FUNCTIONS: શિક્ષક વિભાગ માટે ---
function openTeacher(){ document.getElementById("home").classList.add("hidden"); document.getElementById("teacherLoginBox").classList.remove("hidden"); }
function teacherLogin(){
    if(document.getElementById("tpass").value==="admin123"){
        document.getElementById("teacherLoginBox").classList.add("hidden");
        document.getElementById("teacher").classList.remove("hidden");
        loadTable();
    } else alert("ખોટો પાસવર્ડ!");
}

// --- DATA TABLE LOADER: પરિણામ પત્રક લોડ કરવું ---
function loadTable(){
    const body=document.getElementById("table-body");
    database.ref('results').orderByChild('roll').on('value', snap => {
        body.innerHTML=""; let count = 0;
        snap.forEach(child => {
            const r=child.val();
            body.innerHTML+=`<tr><td>${r.roll}</td><td>${r.name}</td><td>${r.ch}</td><td>${r.score}</td><td>${r.percent}</td><td>${r.date}</td></tr>`;
            count++;
        });
        document.getElementById("studentCount").textContent = count;
    });
}

// --- EXCEL DOWNLOAD: એક્સેલ ફાઈલ ડાઉનલોડ કરવા માટે ---
function downloadExcel(){
    database.ref('results').orderByChild('roll').once('value', snap => {
        if (!snap.exists()) { alert("કોઈ ડેટા નથી!"); return; }
        let arr = [];
        snap.forEach(c => {
            const r = c.val();
            arr.push({
                "રોલ નંબર": r.roll,
                "વિદ્યાર્થીનું નામ": r.name,
                "પાઠ": r.ch,
                "સ્કોર": r.score,
                "ટકાવારી": r.percent,
                "તારીખ": r.date
            });
        });
        const ws = XLSX.utils.json_to_sheet(arr);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Results");
        XLSX.writeFile(wb, "School_Quiz_Results.xlsx");
    });
}

// --- UTILITY FUNCTIONS: ડેટા ક્લિયર અને હોમ પેજ માટે ---
function clearAllResults(){ if(confirm("બધો ડેટા ડિલીટ કરવો છે?")) database.ref('results').remove(); }
function goHome(){ location.reload(); }
